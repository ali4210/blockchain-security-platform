name: "🔐 Blockchain Security Scan"

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  vulnerable-demo-scan:
    name: "❌ VulnerableBank Demo Scan (Expected Findings)"
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python 3.10"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: "📦 Install Slither"
        run: |
          pip install slither-analyzer
          echo "Slither version: $(slither --version)"

      - name: "🔍 Scan VulnerableBank.sol"
        run: |
          mkdir -p reports
          slither contracts/VulnerableBank.sol --json reports/VulnerableBank_report.json || true

      - name: "🚨 Show expected critical findings"
        run: |
          python3 - <<'EOF'
          import json, sys

          report_file = "reports/VulnerableBank_report.json"
          critical = 0

          try:
              with open(report_file) as f:
                  data = json.load(f)

              detectors = data.get("results", {}).get("detectors", [])
              for d in detectors:
                  if d.get("impact") == "High":
                      critical += 1
                      print(f"[EXPECTED HIGH] {d.get('check')} in {report_file}")

              if critical > 0:
                  print(f"\n✅ Demo successful: VulnerableBank produced {critical} High finding(s), as expected.")
              else:
                  print("\n⚠️ Demo note: No High findings detected in VulnerableBank.")
          except Exception as e:
              print(f"Could not parse {report_file}: {e}")
              sys.exit(1)
          EOF

      - name: "📤 Upload VulnerableBank report"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vulnerablebank-report
          path: reports/VulnerableBank_report.json

  secure-contract-scan:
    name: "✅ SecureBank Security Gate"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python 3.10"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: "🟢 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: "📦 Install Node dependencies"
        run: |
          npm install

      - name: "📦 Install Slither"
        run: |
          pip install slither-analyzer

      - name: "🔍 Scan SecureBank.sol and save report"
        run: |
          mkdir -p reports
          slither contracts/SecureBank.sol \
            --solc-remaps "@openzeppelin=node_modules/@openzeppelin" \
            --json reports/SecureBank_report.json || true

      - name: "🚦 Fail only if SecureBank has High issues"
        run: |
          python3 - <<'EOF'
          import json, sys

          report_file = "reports/SecureBank_report.json"
          critical = 0

          try:
              with open(report_file) as f:
                  data = json.load(f)

              detectors = data.get("results", {}).get("detectors", [])
              for d in detectors:
                  impact = d.get("impact")
                  check = d.get("check")

                  if impact == "High":
                      critical += 1
                      print(f"[CRITICAL] {check} in {report_file}")
                  else:
                      print(f"[INFO] {impact} - {check}")

              if critical > 0:
                  print(f"\n❌ SECURITY GATE FAILED — {critical} High issue(s) found in SecureBank!")
                  sys.exit(1)
              else:
                  print("✅ SECURITY GATE PASSED — SecureBank has no High issues.")
          except Exception as e:
              print(f"Could not parse {report_file}: {e}")
              sys.exit(1)
          EOF

      - name: "📤 Upload SecureBank report"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: securebank-report
          path: reports/SecureBank_report.json

  dependency-check:
    name: "📦 Dependency & License Check"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🟢 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: "📦 Install dependencies"
        run: |
          if [ -f package.json ]; then
            npm install
            echo "✅ Dependencies installed"
          else
            echo "⚠️ No package.json found — skipping npm install"
          fi

      - name: "🔎 Audit npm packages"
        run: |
          if [ -f package.json ]; then
            npm audit --audit-level=high || true
          else
            echo "Skipping npm audit — no package.json"
          fi

  final-green-gate:
    name: "🎯 Final Pipeline Status"
    runs-on: ubuntu-latest
    needs: [vulnerable-demo-scan, secure-contract-scan, dependency-check]

    steps:
      - name: "✅ Pipeline summary"
        run: |
          echo "========================================"
          echo "  DEVSECOPS PIPELINE COMPLETE"
          echo "========================================"
          echo "  VulnerableBank : Findings detected (expected demo result)"
          echo "  SecureBank     : Passed security gate"
          echo "  Dependencies   : Checked"
          echo "========================================"
          echo "  FINAL STATUS: GREEN ✅"
          echo "========================================"
