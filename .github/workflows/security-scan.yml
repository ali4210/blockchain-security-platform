name: "🔐 Blockchain Security Scan"

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      scan_mode:
        description: "Choose which contract to validate"
        required: true
        default: "secure"
        type: choice
        options:
          - secure
          - vulnerable

jobs:
  selected-contract-scan:
    name: "🛡️ Selected Contract Security Scan"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python 3.10"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: "🟢 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: "📦 Install dependencies"
        run: |
          npm install
          pip install slither-analyzer

      - name: "🎯 Select contract"
        id: target
        run: |
          MODE="${{ github.event.inputs.scan_mode }}"
          if [ -z "$MODE" ]; then
            MODE="secure"
          fi

          if [ "$MODE" = "vulnerable" ]; then
            echo "contract_file=contracts/VulnerableBank.sol" >> $GITHUB_OUTPUT
            echo "report_file=reports/VulnerableBank_report.json" >> $GITHUB_OUTPUT
            echo "label=VulnerableBank" >> $GITHUB_OUTPUT
          else
            echo "contract_file=contracts/SecureBank.sol" >> $GITHUB_OUTPUT
            echo "report_file=reports/SecureBank_report.json" >> $GITHUB_OUTPUT
            echo "label=SecureBank" >> $GITHUB_OUTPUT
          fi

      - name: "🔍 Run Slither scan"
        run: |
          mkdir -p reports
          slither "${{ steps.target.outputs.contract_file }}" \
            --solc-remaps "@openzeppelin=node_modules/@openzeppelin" \
            --json "${{ steps.target.outputs.report_file }}" || true

      - name: "🚦 Apply security gate"
        run: |
          python3 - <<'EOF'
          import json, sys

          mode = "${{ github.event.inputs.scan_mode }}"
          if not mode:
              mode = "secure"

          label = "${{ steps.target.outputs.label }}"
          report_file = "${{ steps.target.outputs.report_file }}"

          critical = 0

          try:
              with open(report_file) as f:
                  data = json.load(f)

              detectors = data.get("results", {}).get("detectors", [])
              for d in detectors:
                  impact = d.get("impact")
                  check = d.get("check")

                  if impact == "High":
                      critical += 1
                      print(f"[HIGH] {check} in {label}")
                  else:
                      print(f"[INFO] {impact} - {check}")

              if mode == "vulnerable":
                  if critical > 0:
                      print(f"\n❌ EXPECTED FAILURE: {label} contains {critical} High vulnerability finding(s).")
                      print("   This demonstrates that the CI/CD pipeline blocks insecure code.")
                      sys.exit(1)
                  else:
                      print(f"\n⚠️ Unexpected result: {label} did not produce High findings.")
                      sys.exit(1)

              if mode == "secure":
                  if critical > 0:
                      print(f"\n❌ SECURITY GATE FAILED: {label} contains {critical} High vulnerability finding(s).")
                      sys.exit(1)
                  else:
                      print(f"\n✅ SECURITY GATE PASSED: {label} has no High vulnerability findings.")
                      sys.exit(0)

          except Exception as e:
              print(f"Could not parse {report_file}: {e}")
              sys.exit(1)
          EOF

      - name: "📤 Upload scan report"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selected-contract-report
          path: reports/

  dependency-check:
    name: "📦 Dependency & License Check"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🟢 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: "📦 Install dependencies"
        run: |
          if [ -f package.json ]; then
            npm install
            echo "✅ Dependencies installed"
          else
            echo "⚠️ No package.json found — skipping npm install"
          fi

      - name: "🔎 Audit npm packages"
        run: |
          if [ -f package.json ]; then
            npm audit --audit-level=high || true
          else
            echo "Skipping npm audit — no package.json"
          fi
