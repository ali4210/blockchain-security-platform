name: "🔐 Blockchain Security Scan"

# Triggers: runs on every push and pull request to main/develop
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # also allows manual trigger from GitHub UI

jobs:
  # ── JOB 1: Smart Contract Security Scan ──────────────────────────────
  smart-contract-audit:
    name: "Smart Contract Audit (Slither)"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python 3.10"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: "📦 Install Slither"
        run: |
          pip install slither-analyzer
          echo "Slither version: $(slither --version)"

      - name: "🔍 Run Slither on all contracts"
        run: |
          echo "========================================"
          echo "  BLOCKCHAIN SECURITY SCANNER"
          echo "  Topic 124 — Saleem Ali — Al-Nafi"
          echo "========================================"
          EXIT_CODE=0
          for contract in contracts/*.sol; do
            echo ""
            echo "Scanning: $contract"
            echo "----------------------------------------"
            slither "$contract" 2>&1 || EXIT_CODE=$?
          done
          echo ""
          echo "Scan complete. Exit code: $EXIT_CODE"

      - name: "📊 Generate JSON report"
        run: |
          mkdir -p reports
          for contract in contracts/*.sol; do
            name=$(basename "$contract" .sol)
            slither "$contract" --json "reports/${name}_report.json" 2>/dev/null || true
            echo "Report saved: reports/${name}_report.json"
          done

      - name: "🚦 Security Gate — block if CRITICAL found"
        run: |
          python3 - <<'EOF'
          import json, glob, sys

          critical = 0
          for report_file in glob.glob("reports/*_report.json"):
              try:
                  with open(report_file) as f:
                      data = json.load(f)
                  detectors = data.get("results", {}).get("detectors", [])
                  for d in detectors:
                      if d.get("impact") == "High":
                          critical += 1
                          print(f"[CRITICAL] {d.get('check')} in {report_file}")
              except Exception as e:
                  print(f"Could not parse {report_file}: {e}")

          if critical > 0:
              print(f"\n❌ SECURITY GATE FAILED — {critical} critical issue(s) found!")
              print("   Fix all HIGH severity vulnerabilities before deploying.")
              sys.exit(1)
          else:
              print("✅ SECURITY GATE PASSED — No critical issues found.")
          EOF

      - name: "📤 Upload security reports"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: reports/

  # ── JOB 2: Dependency Check ───────────────────────────────────────────
  dependency-check:
    name: "Dependency & License Check"
    runs-on: ubuntu-latest
    needs: smart-contract-audit

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🟢 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: "📦 Install Hardhat dependencies"
        run: |
          if [ -f package.json ]; then
            npm install
            echo "✅ Dependencies installed"
          else
            echo "⚠️  No package.json found — skipping npm install"
          fi

      - name: "🔎 Audit npm packages"
        run: |
          if [ -f package.json ]; then
            npm audit --audit-level=high || true
          else
            echo "Skipping npm audit — no package.json"
          fi

  # ── JOB 3: Deployment Gate ────────────────────────────────────────────
  deployment-gate:
    name: "✅ Deployment Gate"
    runs-on: ubuntu-latest
    needs: [ smart-contract-audit, dependency-check ]

    steps:
      - name: "🎯 All checks passed"
        run: |
          echo "========================================"
          echo "  ALL SECURITY CHECKS PASSED"
          echo "  Safe to deploy to testnet"
          echo "  Topic 124 — Saleem Ali — Al-Nafi"
          echo "========================================"
